# Minimal Supabase CLI config. Run `supabase init` or merge with your project
# config if you already use Supabase locally.
#
# Database Webhooks cannot send a user JWT, so this function is gated by
# REPORT_WEBHOOK_SECRET instead (see function source).

[functions.content-report-email]
verify_jwt = false

# Database Webhook on `notifications` INSERT -> sends an Expo push to the
# recipient's devices. Gated by PUSH_WEBHOOK_SECRET (see function source).
[functions.send-push]
verify_jwt = false

# The caller sends a Clerk-issued JWT (not a Supabase-issued one), so the
# gateway's built-in verification is disabled and the function verifies the
# token itself with SUPABASE_JWT_SECRET.
[functions.delete-account]
verify_jwt = false
